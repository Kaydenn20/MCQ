<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic 4 Quiz</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

h1 {
  text-align: center;
  color: #1e3a8a;
}

.question {
  margin-bottom: 20px;
  padding: 15px;
  border: 1px solid #ddd;
  border-radius: 10px;
  background: #fafafa;
}

.question img {
  max-width: 100%;
  margin: 10px 0;
  border-radius: 8px;
}

label {
  display: block;
  margin: 6px 0;
  cursor: pointer;
}

button {
  width: 100%;
  padding: 14px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

button:hover {
  background: #1d4ed8;
}

.result {
  margin-top: 20px;
  text-align: center;
  font-weight: bold;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
<h1>Topic 4: Research Design</h1>

<div id="quiz"></div>

<button onclick="submitQuiz()">Submit Quiz</button>

<div id="result" class="result"></div>
</div>

<script>

const quizData = [

{
q: "38. The research design is like a blueprint and it describes the entire framework or plan for a research project.",
options: ["Yes","No"],
answer: 0
},

{
q: `39. The followings are the characteristics of ___ research:<br><br>
i. To gain qualitative insights and understanding of the problem (e.g. underlying reasons and motivations)<br>
ii. Sampling is less stringent on representativeness and randomness<br>
iii. Sample size is generally small<br>
iv. Unstructured and flexible in data collection`,
options: [
"Quantitative research",
"Qualitative research",
"Experimental research",
"Survey research"
],
answer: 1
},

{
q: "40. Quantitative research is more statistical in nature.",
options: ["Yes","No"],
answer: 0
},

{
q: `41. The following are characteristics of ____ data:<br><br>
i. For the problem at hand<br>
ii. Data collection process is complex and involved<br>
iii. Cost incurred is relatively high<br>
iv. Time consuming`,
options: ["Secondary","Tertiary","Primary"],
answer: 2
},

{
q: "42. Which one of the followings is NOT the disadvantage of longitudinal research?",
options: [
"Information takes a considerable period of time to collect",
"Need good cooperation from respondents",
"Information is obtained more than once and usually is more reliable",
"Relatively expensive to carry out"
],
answer: 2
},

{
q: "43. The depth interview has the following advantages EXCEPT:",
options: [
"Uncover greater depth of insights",
"Always better than focus group",
"Direct attribution of responses",
"Free exchange of information"
],
answer: 1
},

{
q: "44. Which link for categorization of the type of research design is NOT true?",
image: "https://raw.githubusercontent.com/shafizal20/MCQ/main/images/question44.png",
options: ["A","B","C","D"],
answer: 1
},

{
q: "45. Descriptive research usually will answer the 6 Ws questions.",
options: ["Yes","No"],
answer: 0
},

{
q: "46. Causal research includes the followings EXCEPT:",
options: [
"Experiment",
"Cause-and-effect relationship",
"Manipulation of variables",
"Cross-sectional descriptive research"
],
answer: 3
},

{
q: "47. The followings are the advantages of Focus Groups EXCEPT:",
options: [
"Speed",
"Synergy",
"Structure",
"Size"
],
answer: 3
},

{
q: `48. The conditions for causality includes: Logical time sequence, ____ and control for other causal factors.`,
options: [
"Commitment",
"Concomitant variation",
"Concise measurement",
"Co-creation"
],
answer: 1
},

{
q: "49. Which of the following is NOT a Projective Technique?",
options: [
"Word association",
"Sentence completion",
"Projection",
"Construction"
],
answer: 2
}

];

const quiz = document.getElementById("quiz");

quizData.forEach((item,i)=>{
let html = `<div class="question">`;
html += `<p>${item.q}</p>`;

if(item.image){
html += `<img src="${item.image}">`;
}

item.options.forEach((opt,j)=>{
html += `
<label>
<input type="radio" name="q${i}" value="${j}">
${opt}
</label>
`;
});

html += `</div>`;
quiz.innerHTML += html;
});

function submitQuiz(){
let score = 0;

quizData.forEach((item,i)=>{
const selected = document.querySelector(`input[name="q${i}"]:checked`);
if(selected && parseInt(selected.value) === item.answer){
score++;
}
});

document.getElementById("result").innerHTML =
`Your Score: ${score} / ${quizData.length}`;
}

</script>

</body>
</html>
